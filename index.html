<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пазл</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: white;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
            text-align: center;
        }
        .upload-area {
            border: 2px dashed #fff;
            padding: 30px;
            margin: 20px 0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .upload-area:hover {
            background: rgba(255,255,255,0.1);
        }
        .upload-area.dragover {
            background: rgba(255,255,255,0.2);
        }
        #imageInput {
            display: none;
        }
        .game-container {
            display: none;
            margin-top: 20px;
        }
        .puzzle-area {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
        }
        .puzzle-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 2px;
            width: 300px;
            height: 300px;
            margin: 0 auto;
            background: #333;
            border-radius: 5px;
            padding: 5px;
        }
        .puzzle-piece {
            background-size: 300px 300px;
            border-radius: 3px;
            cursor: move;
            transition: transform 0.2s ease;
        }
        .puzzle-piece:hover {
            transform: scale(1.05);
        }
        .puzzle-piece.dragging {
            opacity: 0.5;
        }
        .pieces-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 20px 0;
            padding: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }
        .piece {
            width: 80px;
            height: 80px;
            background-size: 240px 240px;
            border-radius: 5px;
            cursor: move;
            transition: transform 0.2s ease;
        }
        .piece:hover {
            transform: scale(1.1);
        }
        .piece.dragging {
            opacity: 0.5;
        }
        .controls {
            margin: 20px 0;
        }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin: 5px;
        }
        button:hover {
            background: #45a049;
        }
        .success {
            color: #4CAF50;
            font-size: 18px;
            font-weight: bold;
            margin: 20px 0;
        }
        .timer {
            font-size: 18px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧩 Пазл</h1>
        
        <div class="upload-section">
            <div class="upload-area" onclick="document.getElementById('imageInput').click()">
                <p>📸 Кликни или перетащи фото сюда</p>
                <input type="file" id="imageInput" accept="image/*">
            </div>
        </div>

        <div class="game-container" id="gameContainer">
            <div class="timer">⏱️ Время: <span id="timer">00:00</span></div>
            
            <div class="puzzle-area">
                <h3>Собери пазл:</h3>
                <div class="puzzle-grid" id="puzzleGrid"></div>
            </div>

            <div class="pieces-container" id="piecesContainer">
                <h3>Кусочки:</h3>
            </div>

            <div class="controls">
                <button onclick="shufflePieces()">🔀 Перемешать</button>
                <button onclick="resetGame()">🔄 Сначала</button>
            </div>

            <div class="success" id="successMessage" style="display: none;"></div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        let currentImage = null;
        let pieces = [];
        let startTime = null;
        let timerInterval = null;
        let gameCompleted = false;

        const imageInput = document.getElementById('imageInput');
        const gameContainer = document.getElementById('gameContainer');
        const puzzleGrid = document.getElementById('puzzleGrid');
        const piecesContainer = document.getElementById('piecesContainer');
        const uploadArea = document.querySelector('.upload-area');
        const successMessage = document.getElementById('successMessage');
        const timerDisplay = document.getElementById('timer');

        // Drag and drop для загрузки файла
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleImageUpload(files[0]);
            }
        });

        imageInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleImageUpload(e.target.files[0]);
            }
        });

        function handleImageUpload(file) {
            if (!file.type.startsWith('image/')) {
                alert('Пожалуйста, выберите изображение');
                return;
            }

            const reader = new FileReader();
            reader.onload = (e) => {
                currentImage = e.target.result;
                initGame();
                updateMainButton();
            };
            reader.readAsDataURL(file);
        }

        function initGame() {
            gameContainer.style.display = 'block';
            createPuzzle();
            startTimer();
        }

        function createPuzzle() {
            puzzleGrid.innerHTML = '';
            piecesContainer.innerHTML = '<h3>Кусочки:</h3>';
            pieces = [];
            gameCompleted = false;

            // Создаем 9 ячеек для пазла (3x3)
            for (let i = 0; i < 9; i++) {
                const cell = document.createElement('div');
                cell.className = 'puzzle-piece';
                cell.dataset.position = i;
                cell.addEventListener('dragover', handleDragOver);
                cell.addEventListener('drop', handleDrop);
                puzzleGrid.appendChild(cell);
            }

            // Создаем кусочки пазла
            for (let i = 0; i < 9; i++) {
                const piece = document.createElement('div');
                piece.className = 'piece';
                piece.draggable = true;
                piece.dataset.pieceId = i;
                piece.dataset.correctPosition = i;
                
                const row = Math.floor(i / 3);
                const col = i % 3;
                piece.style.backgroundImage = `url(${currentImage})`;
                piece.style.backgroundPosition = `-${col * 80}px -${row * 80}px`;
                
                piece.addEventListener('dragstart', handleDragStart);
                piece.addEventListener('dragend', handleDragEnd);
                
                pieces.push(piece);
                piecesContainer.appendChild(piece);
            }

            shufflePieces();
        }

        function shufflePieces() {
            // Перемешиваем кусочки
            for (let i = pieces.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [pieces[i], pieces[j]] = [pieces[j], pieces[i]];
            }
            
            // Обновляем отображение
            const container = document.getElementById('piecesContainer');
            container.innerHTML = '<h3>Кусочки:</h3>';
            pieces.forEach(piece => container.appendChild(piece));
        }

        function handleDragStart(e) {
            e.dataTransfer.setData('text/plain', e.target.dataset.pieceId);
            e.target.classList.add('dragging');
        }

        function handleDragEnd(e) {
            e.target.classList.remove('dragging');
        }

        function handleDragOver(e) {
            e.preventDefault();
        }

        function handleDrop(e) {
            e.preventDefault();
            const pieceId = e.dataTransfer.getData('text/plain');
            const piece = document.querySelector(`[data-piece-id="${pieceId}"]`);
            const targetCell = e.target;

            if (targetCell.classList.contains('puzzle-piece') && !targetCell.hasChildNodes()) {
                const row = Math.floor(parseInt(targetCell.dataset.position) / 3);
                const col = parseInt(targetCell.dataset.position) % 3;
                
                piece.style.backgroundPosition = `-${col * 100}px -${row * 100}px`;
                piece.style.backgroundSize = '300px 300px';
                piece.style.width = '100%';
                piece.style.height = '100%';
                piece.style.borderRadius = '3px';
                
                targetCell.appendChild(piece);
                checkCompletion();
            }
        }

        function checkCompletion() {
            const cells = document.querySelectorAll('.puzzle-piece');
            let correct = 0;

            cells.forEach((cell, index) => {
                if (cell.hasChildNodes()) {
                    const piece = cell.firstChild;
                    if (parseInt(piece.dataset.correctPosition) === index) {
                        correct++;
                    }
                }
            });

            if (correct === 9) {
                gameCompleted = true;
                stopTimer();
                const time = timerDisplay.textContent;
                successMessage.innerHTML = `🎉 Поздравляю! Пазл собран за ${time}!`;
                successMessage.style.display = 'block';
                updateMainButton();
                
                // Отправляем результат в Telegram
                tg.sendData(JSON.stringify({
                    action: 'puzzle_completed',
                    time: time,
                    timestamp: new Date().toISOString()
                }));
            }
        }

        function startTimer() {
            startTime = Date.now();
            timerInterval = setInterval(updateTimer, 1000);
        }

        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }

        function updateTimer() {
            if (startTime) {
                const elapsed = Math.floor((Date.now() - startTime) / 1000);
                const minutes = Math.floor(elapsed / 60);
                const seconds = elapsed % 60;
                timerDisplay.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            }
        }

        function resetGame() {
            stopTimer();
            successMessage.style.display = 'none';
            if (currentImage) {
                initGame();
                updateMainButton();
            }
        }

        // Настройка главной кнопки Telegram
        function updateMainButton() {
            if (gameCompleted) {
                tg.MainButton.setText('Поделиться результатом');
                tg.MainButton.show();
            } else if (currentImage) {
                tg.MainButton.setText('Играю в пазл...');
                tg.MainButton.hide();
            } else {
                tg.MainButton.setText('Выбери фото');
                tg.MainButton.hide();
            }
        }

        tg.MainButton.onClick(() => {
            if (gameCompleted) {
                tg.close();
            } else {
                tg.showAlert('Сначала собери пазл!');
            }
        });

        updateMainButton();
    </script>
</body>
</html>
